syntax = "proto3";

package pet;

service PetService {
  // 核心中枢：纯净算力通道
  rpc Chat (ChatRequest) returns (ChatReply) {}
  
  // Phase 8 最新基建：独立注册与独立登录通道
  rpc RegisterAccount (AuthRegisterReq) returns (AuthRegisterReply) {}
  rpc LoginAccount (AuthLoginReq) returns (AuthLoginReply) {}
}

message ChatRequest {
  string session_id = 1;
  string message = 2;
}

message ChatReply {
  string reply = 1;
}

message AuthRegisterReq {
  string account_name = 1;
  string password = 2;
  string pet_name = 3;
  string avatar = 4;
}

message AuthRegisterReply {
  bool success = 1;
  string message = 2;
}

message AuthLoginReq {
  string account_name = 1;
  string password = 2;
}

message AuthLoginReply {
  bool success = 1;
  string message = 2;
  string pet_name = 3;
  string avatar = 4; // 这个极度重要！必须返回给前端才能正确渲染以前的身体！
}
